<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Ankur Vadlamani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f7fafc;
            color: #2d3748;
        }
        .blog-post-body {
            font-family: 'Merriweather', serif;
        }
        #modal {
            transition: opacity 0.3s ease;
        }
        .prose {
            font-family: 'Merriweather', serif;
            line-height: 1.75;
        }
        .prose h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin-top: 2em;
            margin-bottom: 1em;
        }
        .prose h3 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .prose a {
            color: #4299e1;
            text-decoration: underline;
        }
        .prose blockquote {
            border-left-color: #4299e1;
            font-style: italic;
        }
        .blog-entry:hover {
            background-color: #edf2f7;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-gray-800">Ankur Vadlamani</a>
            <nav>
                <a href="index.html#contact" class="text-sm text-gray-600 hover:text-blue-500 transition-colors">Contact</a>
            </nav>
        </div>
    </header>

    <main class="py-20 md:py-28">
        <div class="container mx-auto px-6">
            <div class="text-center mb-16">
                <h1 class="text-4xl md:text-5xl font-bold text-gray-800">My Blog</h1>
                <p class="mt-3 text-lg text-gray-600">Thoughts on technology, design, and everything in between.</p>
            </div>

            <div id="blog-posts-container" class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow-md">
                <!-- Blog posts will be dynamically inserted here by JavaScript -->
            </div>
        </div>
    </main>
    
    <!-- Blog Post Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-lg shadow-2xl w-full max-w-3xl max-h-full overflow-y-auto">
            <!-- Modal content will be populated by JS -->
        </div>
    </div>

    <footer class="bg-gray-800 text-white py-6">
        <div class="container mx-auto px-6 text-center text-sm">
            <p>&copy; 2025 Ankur Vadlamani. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const posts = [
                {
                    id: 1,
                    image: "https://i.postimg.cc/3JKjKxTj/image.png",
                    alt: "Low bandwidth transmission",
                    category: "Physics",
                    date: "December 17, 2025",
                    title: "EdgeAI-Enabled Smart Parking System for Efficient, Low-Cost Occupancy Detection",
                    excerpt: "Urban transportation systems are undergoing a profound transformation as cities grow denser and vehicle ownership continues to rise...",
                    contentHTML: `
                        <p>This is the full content for the first blog post. Urban transportation systems are undergoing a profound transformation as cities grow denser and vehicle ownership continues to rise. One of the most persistent and underrated contributors to traffic congestion is the challenge of finding available parking spaces. On average, drivers in metropolitan areas spend a significant portion of their commute simply searching for parking, leading to wasted time, unnecessary fuel consumption, and increased environmental pollution. This everyday inconvenience scales dramatically when multiplied across thousands of vehicles and hundreds of parking zones, resulting in measurable economic and environmental impact for cities.
To address these issues, smart parking systems have emerged as an essential component of modern smart city infrastructure. These systems aim to provide real-time information about parking availability, helping drivers make informed decisions and reducing unnecessary circulation within urban centres. Conventional smart parking solutions rely on IoT sensors installed at each parking slot, which continuously monitor the occupancy status and transmit updates to a cloud server. While this approach has improved parking efficiency compared to traditional manual monitoring, it exposes several fundamental limitations that hinder its long-term sustainability and scalability.
A primary issue faced by existing systems is redundant data transmission. Parking slots often remain unchanged for extended durations either consistently empty or occupied. Yet, most IoT-based systems transmit the same status repeatedly, creating a flood of redundant messages. When multiplied across hundreds or thousands of slots, the volume of unnecessary data becomes substantial. This bloated communication load can overwhelm networks, increase bandwidth requirements, and cause delays during peak usage periods. For commercial deployments that rely on paid data plans or cloud services, such inefficiency directly translates into higher operational costs.
Scalability presents another critical challenge. Traditional systems require each parking slot to be equipped with its own microcontroller featuring Wi-Fi, LoRa, or other communication modules. These microcontrollers are often the most expensive component of the installation. As the number of parking slots increases, the cost of procurement, installation, and maintenance escalates rapidly, making large-scale deployments financially prohibitive. University campuses, shopping malls, airports, corporate campuses, and municipal parking facilities often contain hundreds or thousands of parking slots—systems of this size cannot rely on high-cost per-slot hardware.
Power consumption is an equally important concern. Battery-powered sensors must remain operational for several months or years to maintain system reliability. However, continuous data transmission drains power rapidly, necessitating frequent battery replacements. This increases maintenance overhead, disrupts system continuity, and creates operational burdens for facilities management teams.
In the context of these limitations, the need for a more intelligent, efficient, and scalable smart parking architecture becomes evident. The rise of Edge Computing and EdgeAI provides a compelling opportunity to rethink traditional IoT models and optimize them for real-world viability. EdgeAI allows computational intelligence—typically located on cloud servers—to be executed close to the data source, reducing the dependency on constant communication and enabling real-time, low-latency decision-making.
This project introduces an EdgeAI-enabled Smart Parking System that leverages a hierarchical cluster head architecture to solve the inefficiencies present in conventional systems. Instead of embedding computational and network capabilities in every parking slot, each slot is fitted with a simple, low-cost sensor (such as a magnetometer, infrared sensor, or ultrasonic module) responsible solely for detecting the presence of a vehicle. These sensors transmit minimal raw data to a centralized device called the cluster head, typically implemented using an ESP32 or similar microcontroller.
The cluster head serves as the intelligent processing unit for a group of parking slots. It aggregates sensor inputs, performs real-time feature extraction, and runs a lightweight machine learning model to predict the stability of each parking slot’s state. This prediction allows the system to determine whether the slot is likely to remain in its current state—empty or occupied—or whether a state transition is imminent. Based on this prediction, the cluster head makes a critical decision: whether to transmit an update to the central server or suppress the transmission to avoid redundancy.
This architecture fundamentally changes the data flow of smart parking systems. Instead of every sensor continuously transmitting identical status updates, the cluster head selectively communicates only meaningful state changes, such as when a vehicle arrives or leaves. As a result, the system drastically reduces unnecessary data transmission while preserving real-time accuracy. This reduction has far-reaching benefits: improved network performance, lower operational costs, extended battery life for sensors, and improved scalability for large deployments.
The real-world applications of this approach are extensive. Commercial shopping centers can optimize parking allocations during peak hours. University campuses can provide reliable parking information to students and staff while reducing infrastructure costs. Smart cities can integrate such systems as part of their broader intelligent transportation networks, improving mobility and sustainability. Even private gated communities and office complexes can benefit from the reduced installation and maintenance costs offered by the EdgeAI-based solution.
In summary, the proposed EdgeAI-enabled Smart Parking System addresses the core limitations of traditional IoT parking infrastructures by introducing local intelligence, predictive modelling, and efficient communication strategies. By combining low-cost sensors with edge-based machine learning, the system promotes energy efficiency, operational scalability, and real-time responsiveness—qualities essential for future-ready smart city environments. This project not only showcases the potential of embedded AI in everyday applications but also contributes to the broader mission of creating efficient, sustainable, and intelligent urban mobility systems.
            <h2>Subheading for the Post</h2>
                        <p>You can add more paragraphs and even other HTML elements like lists or blockquotes here to structure your full blog post content.</p>
                    `
                },
                {
                    id: 2,
                    image: "https://placehold.co/800x400/E2E8F0/2D3748?text=Embedded+Systems",
                    alt: "Embedded Systems",
                    category: "Hardware",
                    date: "July 30, 2025",
                    title: "Getting Started with Raspberry Pi Pico",
                    excerpt: "The Raspberry Pi Pico is a low-cost, high-performance microcontroller board with flexible digital interfaces. Unlike its bigger siblings, it's not a computer...",
                    contentHTML: `
                        <p>This is the full content for the Raspberry Pi Pico post. The Raspberry Pi Pico is a low-cost, high-performance microcontroller board with flexible digital interfaces. Unlike its bigger siblings, it's not a computer, but a microcontroller. This makes it perfect for embedded projects where you need real-time control.</p>
                        <p>Here you can elaborate on how to get started, what pins to use, and provide code examples if you wish.</p>
                    `
                } 
            ];

            const container = document.getElementById('blog-posts-container');
            if (container) {
                posts.forEach(post => {
                    const postElement = document.createElement('a');
                    postElement.href = "#";
                    postElement.className = 'blog-entry block p-4 -mx-4 rounded-lg transition-colors duration-200';
                    postElement.onclick = (e) => {
                        e.preventDefault();
                        openModal(post.id);
                    };
                    postElement.innerHTML = `
                        <div class="flex justify-between items-center">
                            <h3 class="text-xl font-semibold text-gray-800 group-hover:text-blue-600">${post.title}</h3>
                            <p class="text-sm text-gray-500 text-right flex-shrink-0 ml-4">${post.date}</p>
                        </div>
                        <p class="text-sm text-blue-600 font-medium mt-1">${post.category}</p>
                    `;
                    container.appendChild(postElement);

                    const divider = document.createElement('hr');
                    if (posts.indexOf(post) < posts.length - 1) {
                        container.appendChild(divider);
                    }
                });
            }

            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');

            window.openModal = function(postId) {
                const post = posts.find(p => p.id === postId);
                if (!post || !modal || !modalContent) return;

                modalContent.innerHTML = `
                    <article class="p-6 md:p-8">
                        <header class="mb-8 text-center">
                            <p class="text-sm text-gray-500">${post.category} &bull; ${post.date}</p>
                            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mt-2 leading-tight">${post.title}</h1>
                        </header>
                        <img src="${post.image}" alt="${post.alt}" class="w-full h-auto rounded-lg shadow-lg mb-12">
                        <div class="prose lg:prose-lg max-w-none text-gray-800">
                            ${post.contentHTML}
                        </div>
                        <div class="text-center mt-12">
                            <button onclick="closeModal()" class="bg-blue-500 text-white font-semibold px-6 py-2 rounded-lg shadow-lg hover:bg-blue-600 transition-colors">Close</button>
                        </div>
                    </article>
                `;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden';
            }

            window.closeModal = function() {
                if (!modal) return;
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }
            
            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        closeModal();
                    }
                });
            }
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        });
    </script>

</body>
</html>
